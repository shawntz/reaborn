name: reaborn main branch version badge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^Version:' DESCRIPTION | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse Version from DESCRIPTION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Trash old badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin badges
          git checkout badges
          git pull origin badges
          rm -f main-branch-version.svg
          git add -A
          git commit -m "removed old main-branch-version.svg file (triggered by ${{ github.sha }}) [skip ci]" || echo "no changes to commit"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:badges

      - name: Create badge
        uses: emibcn/badge-action@f9150fde070fcca0c4e832437611b44838fcd325 # v2.0.4
        with:
          label: main
          status: ${{ steps.version.outputs.version }}
          color: blue
          path: main-branch-version.svg

      - name: Commit and push badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin badges
          git checkout badges
          git add -A
          git commit -m "update main branch version badge (triggered by ${{ github.sha }}) [skip ci]" || echo "no changes to commit"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:badges
